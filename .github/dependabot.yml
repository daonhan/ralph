version: 2
updates:
  # npm dependencies across the pnpm workspace.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7 (native compiler) drops the implicit parent-dir @types
      # scan our pnpm workspace relies on; hold at 5.x until we migrate.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used by the CI / publish / release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
