name: Publish to npm

# release-please owns the "when to release" decision. This workflow fires only
# when release-please (or a maintainer) pushes a component release tag. The old
# path-based "push to main touching packages/core/**" trigger has been removed so
# there is exactly one source of truth for when a publish happens.
#
# Tag schema (see RELEASING.md):
#   ralph-core-vX.Y.Z  -> publishes packages/core (@daonhan/ralph-core)
on:
  push:
    tags:
      - "ralph-core-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish from (e.g. ralph-core-v0.1.2)"
        required: true

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref
