name: Publish ralph-sandbox image

# Primary trigger is the release-please tag `ralph-sandbox-v*`. The legacy
# `image-v*` push trigger is kept for one release as a compatibility shim and is
# removed in a follow-up once a release has gone out cleanly through the new path.
# `workflow_dispatch` is retained as an escape hatch for emergency rebuilds (e.g.
# a base-image CVE) that do not warrant a semver bump.
#
# Tag schema (see RELEASING.md): ralph-sandbox-vX.Y.Z -> image tag vX.Y.Z
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. latest, v0.1.2)"
        required: true
        default: latest
      also_latest:
        description: "Also tag as :latest"
        required: false
        default: "true"
  push:
    tags:
      - "ralph-sandbox-v*"
      - "image-v*" # legacy compatibility shim; removed in a follow-up

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to append the image digest to the GH Release body
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          REF="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "primary=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "also_latest=${{ inputs.also_latest }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          elif [ "${REF#ralph-sandbox-}" != "$REF" ]; then
            # ralph-sandbox-vX.Y.Z -> strip "ralph-sandbox-" -> vX.Y.Z
            echo "primary=${REF#ralph-sandbox-}" >> "$GITHUB_OUTPUT"
            echo "also_latest=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${REF}" >> "$GITHUB_OUTPUT"
          else
            # legacy image-vX.Y.Z -> strip "image-" -> vX.Y.Z (no GH Release to edit)
            echo "primary=${REF#image-}" >> "$GITHUB_OUTPUT"
            echo "also_latest=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose tag list
        id: tags
        run: |
          REPO=docker.io/daonhan/ralph-sandbox
          TAGS="${REPO}:${{ steps.tag.outputs.primary }}"
          if [ "${{ steps.tag.outputs.also_latest }}" = "true" ] && [ "${{ steps.tag.outputs.primary }}" != "latest" ]; then
            TAGS="${TAGS},${REPO}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/core/templates/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Pin the immutable digest into the GH Release notes so operators can deploy
      # reproducibly. Only runs for ralph-sandbox-v* tags (which have a release).
      - name: Append image digest to the GitHub Release
        if: steps.tag.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          REF="docker.io/daonhan/ralph-sandbox@${DIGEST}"
          echo "Pinning ${REF} into release ${RELEASE_TAG}"
          BODY="$(gh release view "$RELEASE_TAG" --json body -q .body || true)"
          {
            printf '%s\n' "$BODY"
            printf '\nImage: %s\n' "$REF"
          } > /tmp/release-body.md
          gh release edit "$RELEASE_TAG" --notes-file /tmp/release-body.md
