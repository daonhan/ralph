name: Publish ralph-sandbox image

# Primary trigger is the release-please tag `ralph-sandbox-v*`. The legacy
# `image-v*` push trigger is kept for one release as a compatibility shim and is
# removed in a follow-up once a release has gone out cleanly through the new path.
# `workflow_dispatch` is retained as an escape hatch for emergency rebuilds (e.g.
# a base-image CVE) that do not warrant a semver bump.
#
# Tag schema (see RELEASING.md): ralph-sandbox-vX.Y.Z -> image tag vX.Y.Z
#
# For ralph-sandbox-v* releases the workflow also pins the immutable sha256 digest
# into the GH Release body and attaches an SBOM (syft) + keyless cosign attestation.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. latest, v0.1.2)"
        required: true
        default: latest
      also_latest:
        description: "Also tag as :latest"
        required: false
        default: "true"
      release_tag:
        description: "GitHub Release tag to enrich (e.g. ralph-sandbox-v0.2.2); leave blank for rebuild-only dispatches"
        required: false
        default: ""
  push:
    tags:
      - "ralph-sandbox-v*"
      - "image-v*" # legacy compatibility shim; removed in a follow-up

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # append digest to + upload artifacts on the GH Release
      id-token: write # keyless cosign attestation (OIDC)
    steps:
      - uses: actions/checkout@v7

      - name: Resolve image tag
        id: tag
        run: |
          REF="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
            if [ -n "$RELEASE_TAG" ] && [ "${RELEASE_TAG#ralph-sandbox-}" = "$RELEASE_TAG" ]; then
              echo "::error::release_tag must look like ralph-sandbox-vX.Y.Z, got '$RELEASE_TAG'"
              exit 1
            fi
            echo "primary=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "also_latest=${{ inputs.also_latest }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          elif [ "${REF#ralph-sandbox-}" != "$REF" ]; then
            # ralph-sandbox-vX.Y.Z -> strip "ralph-sandbox-" -> vX.Y.Z
            echo "primary=${REF#ralph-sandbox-}" >> "$GITHUB_OUTPUT"
            echo "also_latest=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${REF}" >> "$GITHUB_OUTPUT"
          else
            # legacy image-vX.Y.Z -> strip "image-" -> vX.Y.Z (no GH Release to edit)
            echo "primary=${REF#image-}" >> "$GITHUB_OUTPUT"
            echo "also_latest=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose tag list
        id: tags
        run: |
          REPO=docker.io/daonhan/ralph-sandbox
          TAGS="${REPO}:${{ steps.tag.outputs.primary }}"
          if [ "${{ steps.tag.outputs.also_latest }}" = "true" ] && [ "${{ steps.tag.outputs.primary }}" != "latest" ]; then
            TAGS="${TAGS},${REPO}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./packages/core/templates/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - uses: sigstore/cosign-installer@v3
        if: steps.tag.outputs.release_tag != ''
      - uses: anchore/sbom-action/download-syft@v0
        if: steps.tag.outputs.release_tag != ''

      # Pin the immutable digest into the GH Release notes and attach an SBOM.
      # Also attach a cosign attestation when Sigstore's transparency log is available.
      # Only runs for ralph-sandbox-v* tags (which have a release).
      - name: Enrich the GitHub Release (digest, SBOM, attestation)
        if: steps.tag.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          IMAGE_REF="docker.io/daonhan/ralph-sandbox@${DIGEST}"
          OUT="$RUNNER_TEMP/artifacts"
          mkdir -p "$OUT"
          BASE="ralph-sandbox-${RELEASE_TAG#ralph-sandbox-}"
          SBOM="$OUT/$BASE.image.sbom.spdx.json"
          BUNDLE="$OUT/$BASE.image.cosign.bundle"

          # 1) Append the immutable digest to the release body.
          echo "Pinning ${IMAGE_REF} into release ${RELEASE_TAG}"
          BODY="$(gh release view "$RELEASE_TAG" --json body -q .body || true)"
          {
            printf '%s\n' "$BODY" | grep -v '^Image: docker\.io/daonhan/ralph-sandbox@sha256:' || true
            printf '\nImage: %s\n' "$IMAGE_REF"
          } > "$OUT/body.md"
          gh release edit "$RELEASE_TAG" --notes-file "$OUT/body.md"

          # 2) SBOM of the pushed image (scanned by digest, not by tag).
          syft scan "$IMAGE_REF" -o "spdx-json=$SBOM"

          # 3) Keyless (OIDC) cosign attestation over the image SBOM, bundled.
          # Rekor outages should not block a successfully published Docker image.
          ATTESTATION_READY=false
          for attempt in 1 2 3; do
            if cosign attest-blob --yes \
              --predicate "$SBOM" --type spdxjson \
              --bundle "$BUNDLE" "$SBOM"; then
              ATTESTATION_READY=true
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "::warning::cosign attest-blob failed after ${attempt} attempts; uploading SBOM without attestation"
              break
            fi
            sleep_for=$((attempt * 30))
            echo "cosign attest-blob failed; retrying in ${sleep_for}s"
            sleep "$sleep_for"
          done

          # 4) Attach release assets.
          UPLOADS=("$SBOM")
          if [ "$ATTESTATION_READY" = "true" ]; then
            UPLOADS+=("$BUNDLE")
          fi
          gh release upload "$RELEASE_TAG" "${UPLOADS[@]}" --clobber

          UPLOADED="$(basename "$SBOM")"
          if [ "$ATTESTATION_READY" = "true" ]; then
            UPLOADED="${UPLOADED}, $(basename "$BUNDLE")"
          fi
          echo "Uploaded to release $RELEASE_TAG: $UPLOADED"
