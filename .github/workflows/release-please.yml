name: release-please

# Drives the release process for every component in the monorepo.
# On each push to main, release-please reads the conventional-commit history,
# opens (or updates) one Release PR per component, and on merge of that PR
# creates the component's Git tag + GitHub Release. The per-component publish
# workflows (publish-npm.yml, publish-image.yml) hang off those tags.
#
# Config lives at the repo root:
#   - release-please-config.json     (component declarations)
#   - .release-please-manifest.json  (last-released versions; source of truth)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

# A single group so concurrent pushes to main do not open competing Release PRs.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # IMPORTANT: a tag created with the default GITHUB_TOKEN does NOT raise
          # a `push: tags` event in other workflows (GitHub's "a workflow cannot
          # trigger another workflow" rule). Our publish-npm.yml / publish-image.yml
          # trigger on tag pushes, so release-please MUST create those tags with a
          # Personal Access Token (repo scope), stored as the RELEASE_PLEASE_TOKEN
          # secret. Falls back to GITHUB_TOKEN for opening PRs in forks / dry setups,
          # in which case publishing must be kicked off manually (see RELEASING.md).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The steps below only do work when release-please opened/updated a PR.
      - uses: actions/checkout@v7
        if: steps.release.outputs.prs_created == 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        if: steps.release.outputs.prs_created == 'true'
        with:
          node-version: 20

      # Refresh the RELEASING.md status table inside each open Release PR so the
      # maintainer reviews the proposed versions as part of the PR diff. This is the
      # "extra-files hook" equivalent: release-please core only updates version
      # strings, so the table (which also carries dates + tag links) is regenerated
      # here against the PR branch's proposed manifest and pushed back to that branch.
      # The same script (scripts/update-status-table.mjs) is runnable locally for a
      # manual refresh.
      - name: Refresh status table in open Release PRs
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail
          echo "$PRS" | jq -c '.[]' | while read -r pr; do
            BRANCH="$(echo "$pr" | jq -r '.headBranchName')"
            echo "::group::Refreshing status table on $BRANCH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            node scripts/update-status-table.mjs
            if git diff --quiet -- RELEASING.md; then
              echo "no status-table change"
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add RELEASING.md
              git commit -m "chore: refresh release status table"
              git push origin "$BRANCH"
            fi
            git checkout -
            echo "::endgroup::"
          done

      - name: Publish released sandbox image
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_OUTPUTS: ${{ toJson(steps.release.outputs) }}
        run: |
          set -euo pipefail
          TAG="$(node -e '
            const outputs = JSON.parse(process.env.RELEASE_OUTPUTS || "{}");
            const tag = Object.values(outputs).find((value) =>
              typeof value === "string" && /^ralph-sandbox-v/.test(value)
            );
            process.stdout.write(tag || "");
          ')"
          if [ -z "$TAG" ]; then
            echo "no ralph-sandbox release tag in release-please outputs"
            exit 0
          fi

          IMAGE_TAG="${TAG#ralph-sandbox-}"
          echo "Dispatching publish-image.yml for ${TAG} (${IMAGE_TAG})"
          gh workflow run publish-image.yml \
            --ref "$TAG" \
            -f tag="$IMAGE_TAG" \
            -f also_latest=true \
            -f release_tag="$TAG"
